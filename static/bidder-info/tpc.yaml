# Registers the "tpc" bidder name with Prebid Server.
# Does not make outbound HTTP requests.
# Demand is resolved via PBS stored imps.
#
# Fork-only per FORK_NOTES.md — do not include in upstream prebid/prebid-server PRs.

maintainer:
